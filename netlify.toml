[build]
  command = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/antonio-portfolio run build"
  publish = "artifacts/antonio-portfolio/dist/public"
  base = "."

[build.environment]
  NODE_VERSION = "22"
  PORT = "3000"
  BASE_PATH = "/"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
